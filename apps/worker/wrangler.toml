#:schema node_modules/wrangler/config-schema.json
name = "funbutton-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
account_id = "e03523c149209369c46ebc10b8a30b43"

# Monthly reset cron — 00:00 UTC on the 1st.
[triggers]
crons = ["0 0 1 * *"]

# -------- Durable Objects --------
[[durable_objects.bindings]]
name = "USAGE_DO"
class_name = "UsageCounter"

[[durable_objects.bindings]]
name = "LIFETIME_COUNTER"
class_name = "LifetimeCounter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UsageCounter", "LifetimeCounter"]

# -------- KV namespaces (production) --------
# Replace placeholder IDs after `pnpm wrangler kv namespace create LICENSE_KV` etc.
[[kv_namespaces]]
binding = "LICENSE_KV"
id = "a980e960f6cd46878e630e81c17be956"

[[kv_namespaces]]
binding = "USAGE_KV"
id = "abf2c2a96d7345e19317af5b444eb13d"

[[kv_namespaces]]
binding = "CAP_KV"
id = "05f21ba6465c4c7fb45cfb0fc8fa4dce"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "a032c1c39d8e46b3876742b5babcbd04"

# -------- D1 database --------
[[d1_databases]]
binding = "D1_DATABASE"
database_name = "funbutton-prod"
database_id = "f42e6647-162e-4d46-b54c-5f660eaca175"
migrations_dir = "migrations"

# Production worker. The api.funbutton.ai custom route is added by hand
# once Todd attaches the funbutton.ai zone to this Cloudflare account
# (currently registered at Spaceship). Until then the worker is reachable
# at https://funbutton-api.todd-e03.workers.dev.
[env.production]
name = "funbutton-api"
workers_dev = true

# [[env.production.routes]]
# pattern = "api.funbutton.ai/*"
# zone_name = "funbutton.ai"

[[env.production.durable_objects.bindings]]
name = "USAGE_DO"
class_name = "UsageCounter"

[[env.production.durable_objects.bindings]]
name = "LIFETIME_COUNTER"
class_name = "LifetimeCounter"

[[env.production.kv_namespaces]]
binding = "LICENSE_KV"
id = "a980e960f6cd46878e630e81c17be956"

[[env.production.kv_namespaces]]
binding = "USAGE_KV"
id = "abf2c2a96d7345e19317af5b444eb13d"

[[env.production.kv_namespaces]]
binding = "CAP_KV"
id = "05f21ba6465c4c7fb45cfb0fc8fa4dce"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "a032c1c39d8e46b3876742b5babcbd04"

[[env.production.d1_databases]]
binding = "D1_DATABASE"
database_name = "funbutton-prod"
database_id = "f42e6647-162e-4d46-b54c-5f660eaca175"
migrations_dir = "migrations"

# Staging — *.workers.dev for smoke tests before flipping production.
[env.staging]
name = "funbutton-api-staging"

[[env.staging.durable_objects.bindings]]
name = "USAGE_DO"
class_name = "UsageCounter"

[[env.staging.durable_objects.bindings]]
name = "LIFETIME_COUNTER"
class_name = "LifetimeCounter"

[[env.staging.kv_namespaces]]
binding = "LICENSE_KV"
id = "a980e960f6cd46878e630e81c17be956"

[[env.staging.kv_namespaces]]
binding = "USAGE_KV"
id = "abf2c2a96d7345e19317af5b444eb13d"

[[env.staging.kv_namespaces]]
binding = "CAP_KV"
id = "05f21ba6465c4c7fb45cfb0fc8fa4dce"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "a032c1c39d8e46b3876742b5babcbd04"

[[env.staging.d1_databases]]
binding = "D1_DATABASE"
database_name = "funbutton-prod"
database_id = "f42e6647-162e-4d46-b54c-5f660eaca175"
migrations_dir = "migrations"

[observability]
enabled = true
